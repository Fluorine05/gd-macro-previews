name: Auto-process macro submission

on:
  issues:
    types: [opened]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Check if submission issue
        id: check
        run: |
          TITLE="${{ github.event.issue.title }}"
          if [[ "$TITLE" == "Macro submission:"* ]]; then
            echo "is_submission=true" >> $GITHUB_OUTPUT
          fi

      - name: Add label and comment
        if: steps.check.outputs.is_submission == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['macro-submission', 'pending-review']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Submission received! A maintainer will review and merge your macro shortly.\n\n**Instructions for maintainer:**\n1. Download the attached macro file\n2. Place it in `macros/` with the filename `{levelID}.mhr` or `{levelID}.json`\n3. Update `index.json` with the entry\n4. Close this issue'
            });
